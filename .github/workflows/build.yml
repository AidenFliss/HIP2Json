name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-x86
          - linux-x64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set Version Tag
        id: version
        shell: bash
        run: |
          VERSION=$(date -u +'%Y.%m.%d')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish HIP2Json/HIP2Json.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained false \
            /p:AssemblyVersion=${{ steps.version.outputs.version }} \
            /p:FileVersion=${{ steps.version.outputs.version }} \
            /p:Version=${{ steps.version.outputs.version }} \
            -o publish/${{ matrix.runtime }}

      - name: Create ZIP
        run: |
          cd publish/${{ matrix.runtime }}
          zip -r "../../HIP2Json-${{ steps.version.outputs.tag }}-${{ matrix.runtime }}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HIP2Json-${{ matrix.runtime }}
          path: HIP2Json-${{ steps.version.outputs.tag }}-${{ matrix.runtime }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version Tag
        id: version
        shell: bash
        run: |
          VERSION=$(date -u +'%Y.%m.%d')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect ZIPs
        run: |
          mkdir release
          find artifacts -name "*.zip" -exec cp {} release/ \;

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Uploading/updating release assets..."
            gh release upload "$TAG" release/*.zip --clobber
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              release/*.zip \
              --title "HIP2Json $TAG" \
              --generate-notes
          fi